<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKClaw Setup Wizard — Interactive Demo</title>
<style>
  :root {
    --wood-dark: #5a3a1a;
    --wood-medium: #8b6238;
    --wood-light: #b8905a;
    --parchment: #faebd7;
    --parchment-dark: #e8d5b0;
    --grass: #5c8a2f;
    --grass-light: #7cb342;
    --text-dark: #3d2610;
    --text-medium: #6d5030;
    --gold: #ffc107;
    --gold-dark: #f9a825;
    --red: #c0392b;
    --green: #27ae60;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  *::-webkit-scrollbar { width: 8px; }
  *::-webkit-scrollbar-track { background: var(--parchment-dark); border-left: 2px solid var(--wood-light); }
  *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--wood-light), var(--wood-medium)); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: var(--wood-medium); }

  body {
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    color: var(--text-dark);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #3a7d2a;
    image-rendering: pixelated;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 80%, #4a8d32 0%, transparent 40%),
      radial-gradient(circle at 80% 20%, #2d6b1a 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #3a7d2a 0%, transparent 60%),
      linear-gradient(180deg, #5a9d3a 0%, #3a7d2a 30%, #2d6b1a 100%);
    pointer-events: none;
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  .wizard-header {
    padding: 10px 16px 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    background: linear-gradient(180deg, var(--wood-dark) 0%, var(--wood-medium) 60%, var(--wood-light) 100%);
    border-bottom: 3px solid var(--wood-dark);
    box-shadow: 0 3px 0 0 rgba(0,0,0,0.2);
  }
  .wizard-header h1 {
    font-size: 16px; color: var(--gold); font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 1px 1px 0 var(--wood-dark), 2px 2px 0 rgba(0,0,0,0.3);
    font-family: 'Courier New', monospace;
  }
  .demo-badge {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    padding: 3px 10px; border: 2px solid var(--gold); border-radius: 2px;
    background: rgba(255,193,7,0.15); color: var(--gold);
    font-size: 11px; font-family: 'Courier New', monospace; font-weight: 700;
  }
  .skip-btn {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    padding: 3px 10px; border: 2px solid var(--wood-light); border-radius: 2px;
    background: rgba(0,0,0,0.2); color: var(--parchment-dark);
    font-size: 11px; cursor: pointer; transition: all 0.2s;
    font-family: 'Courier New', monospace;
  }
  .skip-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(0,0,0,0.4); }

  .progress-bar {
    display: flex; justify-content: center; gap: 5px;
    padding: 10px 10px 8px; flex-shrink: 0;
    background: linear-gradient(180deg, var(--wood-medium), var(--wood-light) 40%, var(--parchment-dark));
    border-bottom: 2px solid var(--wood-medium);
  }
  .progress-dot {
    width: 18px; height: 18px;
    background: var(--parchment-dark); border: 2px solid var(--wood-medium);
    transition: all 0.3s; cursor: pointer; position: relative;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  }
  .progress-dot.active {
    background: var(--gold); border-color: var(--gold-dark);
    transform: scale(1.3); filter: drop-shadow(0 0 4px rgba(255,193,7,0.6));
  }
  .progress-dot.done { background: var(--grass-light); border-color: var(--grass); }
  .progress-dot::after {
    content: attr(data-label);
    position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
    font-size: 8px; color: var(--text-medium); white-space: nowrap;
    font-family: 'Courier New', monospace; font-weight: 600;
  }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--parchment);
    border-left: 4px solid var(--wood-medium);
    border-right: 4px solid var(--wood-medium);
    box-shadow: inset 0 0 20px rgba(90,58,26,0.08);
  }

  .bubble-row { display: flex; gap: 8px; align-items: flex-start; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .avatar {
    width: 34px; height: 34px; border-radius: 2px;
    background: linear-gradient(135deg, #e8b068, #d49040);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    border: 2px solid var(--wood-dark); box-shadow: 1px 1px 0 var(--wood-dark);
  }
  .bubble {
    background: #fffdf5; border: 2px solid var(--wood-medium); border-radius: 2px;
    padding: 8px 12px; max-width: 85%;
    box-shadow: 2px 2px 0 rgba(90,58,26,0.15);
    line-height: 1.6; font-size: 13px; color: var(--text-dark); position: relative;
  }
  .bubble::before {
    content: ''; position: absolute; left: -7px; top: 8px;
    border: 5px solid transparent; border-right-color: var(--wood-medium);
    border-left: 0; width: 0; height: 0;
  }
  .bubble::after {
    content: ''; position: absolute; left: -4px; top: 9px;
    border: 4px solid transparent; border-right-color: #fffdf5;
    border-left: 0; width: 0; height: 0;
  }
  .typing-cursor {
    display: inline-block; width: 2px; height: 13px;
    background: var(--wood-dark); animation: blink 0.5s step-end infinite;
    vertical-align: middle; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Step Card (v3.5.2 enhanced) */
  .step-card {
    background: linear-gradient(180deg, #fffef8, var(--parchment));
    border: 3px solid var(--wood-medium); border-radius: 2px;
    padding: 14px 16px;
    box-shadow: 3px 3px 0 rgba(90,58,26,0.15), inset 0 0 0 1px rgba(255,255,255,0.5);
    animation: fadeIn 0.3s ease; position: relative;
  }
  .step-card::before {
    content: '';
    position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
    border: 1px solid var(--wood-light); border-radius: 2px; pointer-events: none;
  }
  .step-card h3 {
    font-size: 13px; color: var(--wood-dark); margin-bottom: 10px; font-weight: 700;
    font-family: 'Courier New', monospace; letter-spacing: 1px;
    border-bottom: 2px solid var(--parchment-dark); padding-bottom: 6px;
  }

  /* Check items (env detection) */
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; margin-bottom: 6px;
    border: 2px solid var(--parchment-dark); border-radius: 2px;
    background: var(--parchment); transition: all 0.2s;
  }
  .check-icon { font-size: 16px; min-width: 20px; }
  .check-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-dark); }
  .check-status { font-size: 11px; color: var(--text-medium); }

  /* Command block */
  .cmd-block {
    display: flex; align-items: center; gap: 6px;
    background: var(--wood-dark); border-radius: 3px;
    padding: 6px 10px; margin: 6px 0;
    font-family: 'Courier New', monospace;
  }
  .cmd-block code { flex: 1; color: #a8ff78; font-size: 11px; word-break: break-all; user-select: all; }
  .copy-btn {
    flex-shrink: 0; background: transparent;
    border: 1px solid rgba(255,255,255,0.2); border-radius: 2px;
    color: #ccc; cursor: pointer; padding: 2px 6px; font-size: 11px; transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

  .status-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
  .status-icon {
    width: 18px; height: 18px; border: 2px solid var(--wood-medium);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; flex-shrink: 0; border-radius: 1px;
  }
  .status-icon.loading { border-color: var(--wood-light); animation: spin 0.8s linear infinite; }
  .status-icon.success { background: #c8e6c9; color: var(--grass); border-color: var(--grass); }
  .status-icon.fail { background: #ffcdd2; color: var(--red); border-color: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .engine-list, .engine-grid { display: flex; flex-direction: column; gap: 6px; }
  .provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .engine-card {
    padding: 8px 12px; border: 2px solid var(--parchment-dark); border-radius: 2px;
    background: var(--parchment); cursor: pointer; transition: all 0.2s; position: relative;
  }
  .engine-card:hover { border-color: var(--wood-light); background: #fffdf5; }
  .engine-card.selected { border-color: var(--gold); background: #fff8e1; box-shadow: 0 0 0 1px var(--gold); }
  .engine-card .engine-name { font-size: 12px; font-weight: 700; color: var(--text-dark); }
  .engine-card .engine-desc { font-size: 10px; color: var(--text-medium); margin-top: 2px; }
  .engine-badge {
    position: absolute; top: 6px; right: 8px;
    font-size: 9px; padding: 1px 6px; border-radius: 2px; font-weight: 700;
  }
  .engine-badge.recommend { background: #e8f5e9; color: var(--grass); border: 1px solid var(--grass-light); }
  .engine-badge.best { background: #fff3e0; color: #e65100; border: 1px solid #ffb74d; }
  .engine-badge.free { background: #e3f2fd; color: #1565c0; border: 1px solid #64b5f6; }
  .provider-grid .engine-card.full-width { grid-column: 1 / -1; }

  .form-group { margin-bottom: 10px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-medium); margin-bottom: 3px; font-family: 'Courier New', monospace; }
  .form-input {
    width: 100%; padding: 6px 10px; border: 2px solid var(--wood-light);
    border-radius: 2px; background: #fffef8; font-size: 12px; color: var(--text-dark);
    font-family: inherit; transition: border-color 0.2s; outline: none;
  }
  .form-input:focus { border-color: var(--gold-dark); box-shadow: 0 0 0 1px var(--gold), inset 0 0 4px rgba(255,193,7,0.1); }
  select.form-input { cursor: pointer; }

  .input-wrap { display: flex; gap: 4px; }
  .input-wrap .form-input { flex: 1; }
  .eye-btn {
    padding: 4px 8px; border: 2px solid var(--parchment-dark); border-radius: 2px;
    background: var(--parchment); cursor: pointer; font-size: 14px;
  }

  .toggle-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px dashed var(--parchment-dark);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 13px; display: flex; gap: 6px; align-items: center; }
  .toggle-sublabel { font-size: 11px; color: var(--text-medium); opacity: 0.8; }
  .toggle-controls { display: flex; align-items: center; gap: 10px; }
  .toggle-tag { font-size: 10px; color: var(--text-medium); width: 30px; text-align: center; font-family: 'Courier New', monospace; }

  .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--parchment-dark); border: 2px solid var(--wood-light);
    border-radius: 2px; transition: 0.3s;
  }
  .slider::before {
    content: ''; position: absolute; height: 12px; width: 12px;
    left: 2px; bottom: 2px; background: var(--wood-light);
    border-radius: 1px; transition: 0.3s;
  }
  input:checked + .slider { background: var(--grass-light); border-color: var(--grass); }
  input:checked + .slider::before { transform: translateX(16px); background: #fff; }

  .btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .btn {
    padding: 6px 16px; border: 2px solid; border-radius: 2px;
    font-size: 12px; font-weight: 700; cursor: pointer;
    font-family: 'Courier New', monospace; transition: all 0.2s;
  }
  .btn-primary { background: var(--gold); border-color: var(--gold-dark); color: var(--wood-dark); }
  .btn-primary:hover { background: var(--gold-dark); }
  .btn-test { background: var(--parchment); border-color: var(--wood-light); color: var(--text-dark); }
  .btn-test:hover { border-color: var(--wood-medium); }
  .btn-small { padding: 4px 12px; font-size: 11px; }
  .btn-install { background: #e8f5e9; border-color: var(--grass); color: var(--grass); font-weight: 700; }
  .btn-install:hover { background: var(--grass-light); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .note-box {
    padding: 8px 10px; border: 2px solid var(--parchment-dark); border-radius: 2px;
    background: rgba(255,253,240,0.6); font-size: 11px; color: var(--text-medium);
    line-height: 1.5; margin-bottom: 10px;
  }

  .upload-area {
    border: 2px dashed var(--wood-light); border-radius: 2px;
    padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s;
    background: rgba(255,253,240,0.4);
  }
  .upload-area:hover { border-color: var(--gold); background: rgba(255,248,225,0.4); }
  .upload-icon { font-size: 24px; margin-bottom: 4px; }
  .upload-text { font-size: 12px; color: var(--text-dark); font-weight: 600; }
  .upload-hint { font-size: 10px; color: var(--text-medium); margin-top: 2px; }

  .test-list { display: flex; flex-direction: column; gap: 6px; }
  .test-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 2px; background: var(--parchment); }
  .test-name { font-size: 12px; font-weight: 600; flex: 1; }
  .test-msg { font-size: 11px; color: var(--text-medium); }

  .wizard-footer {
    padding: 8px 16px; display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--parchment-dark), var(--wood-light) 60%, var(--wood-medium));
    border-top: 2px solid var(--wood-medium);
  }
  .btn-secondary { background: var(--parchment); border-color: var(--wood-light); color: var(--text-dark); }
  .btn-secondary:hover { border-color: var(--wood-medium); }
  .step-label { font-size: 11px; color: var(--text-medium); font-family: 'Courier New', monospace; }

  .env-check { font-size: 11px; padding: 6px 8px; border-radius: 2px; margin-top: 8px; }
  .env-check.ok { background: #e8f5e9; color: var(--grass); }

  .feature-desc {
    background: linear-gradient(135deg, rgba(255,193,7,0.08), rgba(139,98,56,0.05));
    border: 2px solid var(--gold); border-radius: 2px;
    padding: 10px 14px; margin: 6px 0; font-size: 12px; line-height: 1.7;
    color: var(--text-dark);
  }
  .feature-desc strong { color: var(--wood-dark); }
  .feature-desc .tag {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 10px; font-weight: 700; margin-right: 4px;
  }
  .feature-desc .tag-new { background: #e8f5e9; color: var(--grass); }
  .feature-desc .tag-core { background: #fff3e0; color: #e65100; }
  .feature-desc .tag-fix { background: #ffebee; color: var(--red); }

  .hidden { display: none !important; }

  /* Celebration */
  .celebration {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  }
  .celebration-content {
    background: var(--parchment); border: 4px solid var(--gold);
    border-radius: 4px; padding: 32px 40px; text-align: center;
    box-shadow: 0 0 40px rgba(255,193,7,0.3);
    animation: celebPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes celebPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celebration h2 { font-size: 20px; color: var(--gold-dark); margin-bottom: 8px; }
  .celebration p { font-size: 13px; color: var(--text-medium); line-height: 1.6; }
  .celebration .btn { margin-top: 16px; }

  /* Install progress bar */
  .install-progress {
    height: 6px; border-radius: 3px; background: var(--parchment-dark);
    margin-top: 6px; overflow: hidden;
  }
  .install-progress-fill {
    height: 100%; border-radius: 3px; background: var(--grass-light);
    width: 0; transition: width 0.4s ease;
  }
</style>
</head>
<body>

<div class="wizard-header">
  <span class="skip-btn" onclick="jumpToStep(7)">SKIP</span>
  <h1>KKClaw Setup Wizard</h1>
  <span class="demo-badge">DEMO</span>
</div>

<div class="progress-bar" id="progressBar"></div>

<div class="chat-area" id="chatArea"></div>

<div class="wizard-footer">
  <button class="btn btn-secondary" id="btnPrev" onclick="prevStep()" style="visibility:hidden">上一步</button>
  <span class="step-label" id="stepLabel">Smart Setup</span>
  <button class="btn btn-primary" id="btnNext" onclick="nextStep()">开始检测</button>
</div>

<div class="celebration hidden" id="celebration"></div>

<script>
let currentStep = -1; // Start at env check
const totalSteps = 8; // -1(env) + 0..6
const stepLabels = ['Env','Gateway','Model','Channels','TTS','Voice','Display','Done'];

const stepFeatures = [
  { tags: ['new','fix'], title: 'v3.5.2 智能环境检测',
    desc: '10项全自动诊断，一键安装缺失依赖（edge-tts / sqlite3 / node_modules），出错不白屏。' },
  { tags: ['core'], title: 'Gateway 自动检测',
    desc: '自动扫描本地 OpenClaw Gateway 连接状态，检测端口和 Token。连接失败时提供手动输入入口，支持一键测试。' },
  { tags: ['core'], title: '多模型一键配置',
    desc: '内置 9 大 AI 服务商预设（Anthropic / OpenAI / Google / DeepSeek / OpenRouter / 智谱 / 通义 / Kimi / MiniMax），支持自定义中转站。选择即配置，API Key 加密存储。' },
  { tags: ['new'], title: '渠道独立控制',
    desc: '飞书、Telegram、Discord、Web、企业微信 — 每个渠道独立开关语音播报和桌面歌词。一个宠物，多平台联动。' },
  { tags: ['new'], title: '语音引擎 + 音色克隆',
    desc: '4 种 TTS 引擎可选：MiniMax 2.8 HD（最佳音质）、MiniMax 2.5 Turbo（推荐）、CosyVoice（阿里云）、Edge TTS（免费）。支持上传录音一键克隆专属音色。' },
  { tags: ['new'], title: 'Agent 人设定制',
    desc: '给你的 AI 伙伴起名字、选说话风格（甜妹 / 专业 / 幽默 / 酷帅 / 自定义）。自动生成 AGENTS.md + SOUL.md + USER.md + HEARTBEAT.md 全套配置。' },
  { tags: ['core'], title: '显示偏好设置',
    desc: '桌面歌词开关、球体置顶、开机自启动 — 三个开关搞定桌面显示偏好。' },
  { tags: ['core'], title: '全链路自��测试',
    desc: '7 项自动化测试：Gateway → 模型 → TTS → 播报 → 歌词 → Agent 配置 → 自定义音色。逐项检测，失败可单独重试。' },
];

function initProgressBar() {
  const bar = document.getElementById('progressBar');
  bar.innerHTML = stepLabels.map((l, i) =>
    `<div class="progress-dot ${i === 0 ? 'active' : ''}" data-step="${i}" data-label="${l}" onclick="jumpToStep(${i - 1})"></div>`
  ).join('');
}

function updateProgress() {
  const dots = document.querySelectorAll('.progress-dot');
  const visualIdx = currentStep + 1; // -1 → 0, 0 → 1, etc.
  dots.forEach((dot, i) => {
    dot.className = 'progress-dot' + (i === visualIdx ? ' active' : i < visualIdx ? ' done' : '');
  });
  document.getElementById('stepLabel').textContent = currentStep === -1 ? 'Smart Setup' : `Step ${currentStep + 1}/7`;
  document.getElementById('btnPrev').style.visibility = currentStep > -1 ? 'visible' : 'hidden';
  document.getElementById('btnNext').textContent = currentStep === 6 ? '完成 🎉' : currentStep === -1 ? '开始配置' : '下一步';
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function typewrite(el, text, speed = 22) {
  return new Promise(resolve => {
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';
    el.appendChild(cursor);
    let i = 0;
    const iv = setInterval(() => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        document.getElementById('chatArea').scrollTop = 999999;
      } else { clearInterval(iv); cursor.remove(); resolve(); }
    }, speed);
  });
}

async function addBubble(text) {
  const chat = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = 'bubble-row';
  row.innerHTML = `<div class="avatar">🦞</div><div class="bubble"></div>`;
  chat.appendChild(row);
  await typewrite(row.querySelector('.bubble'), text);
}

function addCard(html) {
  const chat = document.getElementById('chatArea');
  const card = document.createElement('div');
  card.className = 'step-card';
  card.innerHTML = html;
  chat.appendChild(card);
  chat.scrollTop = 999999;
  return card;
}

function addFeatureDesc(stepIdx) {
  const f = stepFeatures[stepIdx + 1]; // offset for -1 start
  if (!f) return;
  const tagHtml = f.tags.map(t => {
    const label = t === 'new' ? 'v3.5 NEW' : t === 'fix' ? 'v3.5.2 FIX' : 'CORE';
    return `<span class="tag tag-${t}">${label}</span>`;
  }).join('');
  const chat = document.getElementById('chatArea');
  const el = document.createElement('div');
  el.className = 'feature-desc';
  el.innerHTML = `${tagHtml}<strong>${f.title}</strong><br>${f.desc}`;
  chat.appendChild(el);
  chat.scrollTop = 999999;
}

// ─── Step Renderers ───────────────────────
async function renderStep(step) {
  document.getElementById('chatArea').innerHTML = '';
  addFeatureDesc(step);
  switch(step) {
    case -1: await renderEnvCheck(); break;
    case 0: await renderGateway(); break;
    case 1: await renderModel(); break;
    case 2: await renderChannels(); break;
    case 3: await renderTTS(); break;
    case 4: await renderVoice(); break;
    case 5: await renderDisplay(); break;
    case 6: await renderTest(); break;
  }
}

// ── Step -1: Smart Env Check ──
async function renderEnvCheck() {
  await addBubble('你好呀~ 让我先帮你做个环境体检吧！🔍');
  const checks = [
    { id: 'env-node', name: 'Node.js', result: 'v20.11.1', ok: true },
    { id: 'env-npm', name: 'NPM', result: 'v10.2.4', ok: true },
    { id: 'env-git', name: 'Git', result: 'v2.43.0', ok: true },
    { id: 'env-openclaw', name: 'OpenClaw 目录', result: '~/.openclaw/', ok: true },
    { id: 'env-gateway', name: 'Gateway 状态', result: ':18789 响应正常', ok: true },
    { id: 'env-deps', name: 'node_modules', result: '已安装', ok: true },
    { id: 'env-python', name: 'Python', result: 'v3.11.7', ok: true },
    { id: 'env-edgetss', name: 'edge-tts', result: '已安装', ok: true },
    { id: 'env-sqlite', name: 'sqlite3', result: '缺失', ok: false },
    { id: 'env-space', name: '磁盘空间', result: '152 GB 可用', ok: true },
  ];

  const checksHtml = checks.map(c =>
    `<div class="check-item" id="${c.id}">
      <span class="check-icon">⏳</span>
      <span class="check-name">${c.name}</span>
      <span class="check-status">检测中...</span>
    </div>`
  ).join('');

  addCard(`<h3>🔍 Smart Environment Check</h3>${checksHtml}`);

  // Simulate sequential check animation
  for (let i = 0; i < checks.length; i++) {
    await new Promise(r => setTimeout(r, 280));
    const c = checks[i];
    const item = document.getElementById(c.id);
    item.querySelector('.check-icon').textContent = c.ok ? '✅' : '⚠️';
    item.querySelector('.check-status').textContent = c.result;
    if (!c.ok) {
      item.style.borderColor = 'var(--gold)';
      item.style.background = '#fff8e1';
    }
    document.getElementById('chatArea').scrollTop = 999999;
  }

  // Show result with install button
  const missingCount = checks.filter(c => !c.ok).length;
  const resultCard = addCard(`
    <h3>📋 检测结果</h3>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <span style="font-size:24px;">${missingCount > 0 ? '⚠️' : '🎉'}</span>
      <div>
        <div style="font-weight:700;font-size:13px;">${checks.filter(c=>c.ok).length}/${checks.length} 项通过</div>
        <div style="font-size:11px;color:var(--text-medium);">${missingCount > 0 ? missingCount + ' 项需要修复' : '环境完全就绪！'}</div>
      </div>
    </div>
    ${missingCount > 0 ? `
    <div class="cmd-block">
      <code>pip install edge-tts && npm install sqlite3</code>
      <span class="copy-btn" onclick="this.textContent='✓ 已复制'">📋</span>
    </div>
    <div class="btn-row">
      <button class="btn btn-install" id="install-deps-btn" onclick="simulateInstall(this)">⚡ 一键安装缺失依赖 (${missingCount})</button>
      <button class="btn btn-test" onclick="jumpToStep(-1)">🔄 重新检测</button>
    </div>
    ` : '<div class="env-check ok">✓ 所有检测通过，可以开始配置啦！</div>'}
  `);

  if (missingCount > 0) {
    await addBubble('检测到有依赖缺失~ 点击「一键安装」按钮就能自动搞定 (^_^)');
  } else {
    await addBubble('环境体检全部通过！可以开始配置啦~ ✧*。(o^_^o)✧*。');
  }
}

async function simulateInstall(btn) {
  btn.disabled = true;
  btn.textContent = '⏳ 安装中...';

  // Add progress bar
  const progressDiv = document.createElement('div');
  progressDiv.className = 'install-progress';
  progressDiv.innerHTML = '<div class="install-progress-fill" id="install-fill"></div>';
  btn.parentElement.insertAdjacentElement('afterend', progressDiv);

  const fill = document.getElementById('install-fill');
  const steps = [20, 40, 65, 85, 100];
  for (const pct of steps) {
    await new Promise(r => setTimeout(r, 500));
    fill.style.width = pct + '%';
  }

  await new Promise(r => setTimeout(r, 300));
  btn.textContent = '✅ 安装完成！';
  btn.style.background = '#c8e6c9';
  btn.style.borderColor = 'var(--grass)';

  // Fix the sqlite item
  const sqliteItem = document.getElementById('env-sqlite');
  if (sqliteItem) {
    sqliteItem.querySelector('.check-icon').textContent = '✅';
    sqliteItem.querySelector('.check-status').textContent = '已安装';
    sqliteItem.style.borderColor = 'var(--parchment-dark)';
    sqliteItem.style.background = 'var(--parchment)';
  }

  await addBubble('依赖安装完成！所有组件已就绪~ ✧*。');
}

// ─── Navigation ───────────────────────
function nextStep() {
  if (currentStep === 6) {
    showCelebration();
    return;
  }
  currentStep++;
  updateProgress();
  renderStep(currentStep);
}

function prevStep() {
  if (currentStep > -1) { currentStep--; updateProgress(); renderStep(currentStep); }
}

function jumpToStep(step) {
  if (step === 7) { showCelebration(); return; }
  currentStep = step;
  updateProgress();
  renderStep(currentStep);
}

function showCelebration() {
  const el = document.getElementById('celebration');
  el.classList.remove('hidden');
  el.innerHTML = `<div class="celebration-content">
    <h2>🎉 配置完成！</h2>
    <p>你的 KKClaw 桌面宠物已经准备就绪！<br>享受你的 AI 桌面伴侣吧~ ✧*。(o^_^o)✧*。</p>
    <a href="https://github.com/user/kkclaw/releases" target="_blank" class="btn btn-primary" style="display:inline-block;text-decoration:none;margin-top:16px">下载 KKClaw</a>
  </div>`;
}

initProgressBar();
updateProgress();
